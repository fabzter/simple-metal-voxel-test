name: Release

on:
  # Cut a GitHub Release when a version tag (v*) is pushed.
  # Flow: PR merges to main run CI (ci.yml); when you're ready to ship,
  # `git tag v0.1.0 && git push origin v0.1.0` fires this workflow.
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        # Pinned to match ci.yml. 16.4 ships Swift 6.1.
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: '16.4'

      - name: Ensure Metal toolchain is available
        # See ci.yml for rationale. Bundled with Xcode 16.x; optional
        # download from Xcode 26 on.
        run: |
          if xcrun --find metal >/dev/null 2>&1; then
            echo "Metal toolchain already available: $(xcrun --find metal)"
          else
            echo "Metal toolchain missing; downloading via xcodebuild..."
            xcodebuild -downloadComponent MetalToolchain
          fi

      - name: Run test suite
        run: swift test

      - name: Build release executable
        run: swift build -c release

      - name: Package release binary
        # Zip the whole .build/release/ dir so the VoxelEngine resource
        # bundle (VoxelShaders.metallib, loaded via Bundle.module) travels
        # next to the executable. Apple Silicon only (macos-15-arm64).
        run: |
          cd .build/release
          zip -r "$GITHUB_WORKSPACE/VoxelDemo-macos-arm64-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "VoxelDemo-macos-arm64-${GITHUB_REF_NAME}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
